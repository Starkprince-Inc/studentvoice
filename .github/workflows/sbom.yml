name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: studentvoice.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: studentvoice-sbom
          path: studentvoice.spdx.json
